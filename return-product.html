<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D-TREYA - Wear your vibe</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="assets/CSS/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  <link rel="icon" href="assets/side-menu-img/icon.png" />
  <link rel="stylesheet" href="assets/CSS/New-Drop.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
  <main class="main">


    <div class="brx-dashboard-wrapper">
      <!-- Overlay -->
      <div class="brx-sidebar-overlay" id="brxSidebarOverlay"></div>

      <div class="brx-dashboard-container">
        <!-- Sidebar -->
        <aside class="brx-dashboard-sidebar" id="brxSidebar">
          <div class="brx-user-box">
            <img src="assets/payment-images/user-img.jpeg" class="brx-user-avatar" />
            <h4>Hi Saloni !</h4>
            <!-- <p>Frontend Developer</p> -->
          </div>

          <ul class="brx-sidebar-menu">
            <a href="profile.html">
              <li><i class="bi bi-person"></i> Profile</li>
            </a>
            <a href="orders.html">
              <li><i class="bi bi-box"></i> Orders</li>
            </a>
            <a href="wishlist.html">
              <li><i class="bi bi-heart"></i> Wishlist</li>
            </a>
            <a href="addresses.html">
              <li><i class="bi bi-geo-alt"></i> Address</li>
            </a>
            <a href="return-product.html">
              <li class="active"><i class="bi bi-arrow-counterclockwise"></i> Return Product</li>
            </a>

            <a href="#">
              <li><i class="bi bi-box-arrow-right"></i> Logout</li>
            </a>
          </ul>
        </aside>

        <!-- Main Content -->
        <main class="brx-dashboard-content">
          <div class="top-menu-content">
            <!-- Mobile Toggle -->
            <button class="brx-sidebar-toggle-btn" id="brxSidebarToggle">
              <i class="fa-solid fa-angles-right"></i>
            </button>
            <h2 class="brx-dashboard-title text-uppercase"><i class="bi bi-arrow-counterclockwise"></i> Return Request
            </h2>
          </div>

          <section class="return-container">

            <div class="return-card">

              <div class="return-product">

                <img src="assets/Tshirts/oversize2.jpeg" alt="product">

                <div class="product-details">

                  <h3>Premium Oversized Cotton T-Shirt</h3>

                  <div class="product-meta">
                    <span>Order ID : #BRX59324</span>
                    <span>Price : ₹899</span>
                    <span>Qty : 1</span>
                    <span>Delivered : 12 Mar 2026</span>
                  </div>

                </div>

              </div>

              <form class="return-form">

                <div class="input-group">

                  <label>Return Reason</label>

                  <select>
                    <option>Select reason</option>
                    <option>Damaged Product</option>
                    <option>Wrong Product</option>
                    <option>Size Issue</option>
                    <option>Quality Issue</option>
                  </select>

                </div>

                <div class="input-group">

                  <label>Describe Issue</label>

                  <textarea placeholder="Tell us what went wrong"></textarea>

                </div>

                <div class="upload-wrapper">

                  <label>Upload Product Photos (atleast 3 pictures)</label>

                  <div class="upload-grid">
                    <div class="upload-image-return">
                      <img src="assets/Tshirts/oversize1.jpeg" alt="">
                    </div>
                    <div class="upload-image-return">
                      <img src="assets/Tshirts/polo-tshirts1.jpeg" alt="">
                    </div>
                    <div class="upload-image-return">
                      <img src="assets/Tshirts/oversize2.jpeg" alt="">
                    </div>

                  </div>
                  <label class="upload-item">
                    <input type="file">
                    <i class="bi bi-plus-lg"></i>
                    <p>Add Photo</p>
                  </label>

                </div>

                <button class="return-btn">
                  Submit Return Request
                </button>

              </form>

            </div>

          </section>




      </div>
    </div>
  </main>







  <!-- My Script File -->
  <script src="./assets/JS/toggle_sidebar.js"></script>
  <script src="./assets/JS/my_script.js"></script>
  <script src="./assets/JS/new_script.js"></script>
  <!-- My Script File -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./assets/JS/script.js"></script>
</body>

</html>
